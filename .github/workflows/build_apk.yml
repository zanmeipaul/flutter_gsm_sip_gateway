name: Build Android APK

on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # 指定具体的版本以增加稳定性
          flutter-version: '3.19.0' 
          channel: 'stable'

      - name: Install Android NDK
        run: |
          echo "y" | sudo ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.1.8937393"

      - name: Get dependencies
        run: |
          flutter pub get
          # 强制生成 l10n 文件
          flutter gen-l10n

      - name: Build APK
        # 核心改动：增加 --no-sound-null-safety 以防项目中有旧代码冲突
        # 同时增加 --verbose 查看详细报错
        run: |
          flutter build apk --release --no-tree-shake-icons --no-sound-null-safety

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release-unsigned.apk
