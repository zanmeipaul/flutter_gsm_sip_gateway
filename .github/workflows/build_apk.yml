name: Build Android APK

on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Android NDK
        run: |
          echo "y" | sudo ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.1.8937393"

      - name: Fix Localization Imports
        # 这个脚本会自动把错误的引用替换为我们生成的本地路径
        run: |
          grep -rl "package:flutter_gen/gen_l10n/app_localizations.dart" lib/ | xargs sed -i 's/package:flutter_gen\/gen_l10n\/app_localizations.dart/package:flutter_gsm_sip_gateway\/generated\/app_localizations.dart/g'

      - name: Get dependencies & Generate
        run: |
          flutter pub get
          # 确保生成目录存在
          mkdir -p lib/generated
          flutter gen-l10n

      - name: Build APK
        run: |
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
