name: Build Android APK

on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Fix Assets and Folders
        # 如果 pubspec 引用了不存在的目录，我们手动创建它们以防报错
        run: |
          mkdir -p assets/images
          mkdir -p assets/icons
          mkdir -p lib/generated

      - name: Fix Localization Imports
        run: |
          grep -rl "package:flutter_gen/gen_l10n/app_localizations.dart" lib/ | xargs sed -i 's/package:flutter_gen\/gen_l10n\/app_localizations.dart/package:flutter_gsm_sip_gateway\/generated\/app_localizations.dart/g' || true

      - name: Get dependencies & Generate
        run: |
          flutter pub get
          flutter gen-l10n

      - name: Build Debug APK
        # 使用 debug 模式可以绕过 Release 签名的权限问题
        run: |
          flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
